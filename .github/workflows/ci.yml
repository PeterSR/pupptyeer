name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: gofmt
        run: |
          unformatted="$(gofmt -l cmd internal clients conformance mcp)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: vet (all three modules)
        run: |
          go vet ./...
          go -C clients/go vet ./...
          go -C mcp vet ./...
      - name: test (all three modules; clients/go must build standalone, zero deps)
        run: |
          go test ./...
          go -C clients/go test ./...
          go -C mcp test ./...
      - name: cross-compile (Windows + macOS PTY backends)
        run: |
          for t in windows/amd64 windows/arm64 darwin/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/pupptyeer
            GOOS=${t%/*} GOARCH=${t#*/} go -C mcp build -o /dev/null .
          done

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: cross-client conformance (Go + TS + Python)
        run: bash conformance/run.sh
