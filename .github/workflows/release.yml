name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # npm: pupptyeer-client (TS thin client).
  # OIDC trusted publishing - no stored token. Enable by setting the repo
  # variable PUBLISH_NPM=1 once the package exists and trusted publishing is
  # configured on npmjs.com (the first publish is manual; see PUBLISHING.md).
  publish-npm-client:
    if: vars.PUBLISH_NPM == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use npm with trusted publishing support
        run: npm i -g npm@latest
      - name: Set version from tag and publish
        working-directory: clients/typescript
        run: |
          VER="${GITHUB_REF_NAME#v}"
          npm version "$VER" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public

  # npm: pupptyeer (binary wrapper) + its 6 per-platform packages.
  publish-npm-binary:
    if: vars.PUBLISH_NPM == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use npm with trusted publishing support
        run: npm i -g npm@latest
      - name: Build platform packages
        run: node npm/build.mjs "${GITHUB_REF_NAME#v}"
      - name: Publish platform packages, then the meta package
        run: |
          for d in npm/pupptyeer-*/; do
            ( cd "$d" && npm publish --provenance --access public )
          done
          ( cd npm/pupptyeer && npm publish --provenance --access public )

  # PyPI: pupptyeer-client (Python thin client).
  # OIDC trusted publishing - no stored token. PyPI supports a *pending*
  # publisher, so this works from the very first tag once configured. Enable by
  # setting the repo variable PUBLISH_PYPI=1 (see PUBLISHING.md).
  publish-pypi-client:
    if: vars.PUBLISH_PYPI == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify __version__ matches the tag
        working-directory: clients/python
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GOT="$(python -c 'import re,pathlib; print(re.search(r"__version__ = \"([^\"]+)\"", pathlib.Path("pupptyeer_client.py").read_text()).group(1))')"
          if [ "$VER" != "$GOT" ]; then
            echo "tag $VER != pupptyeer_client.__version__ $GOT" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist

  # PyPI: pupptyeer (umbrella alias that re-exports pupptyeer-client).
  # Its own trusted publisher (PyPI publishers are per-project) for the
  # `pupptyeer` project; gated on the same PUBLISH_PYPI variable.
  publish-pypi-umbrella:
    if: vars.PUBLISH_PYPI == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify __version__ matches the tag
        working-directory: clients/python-umbrella
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GOT="$(python -c 'import re,pathlib; print(re.search(r"__version__ = \"([^\"]+)\"", pathlib.Path("pupptyeer/__init__.py").read_text()).group(1))')"
          if [ "$VER" != "$GOT" ]; then
            echo "tag $VER != pupptyeer.__version__ $GOT" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        working-directory: clients/python-umbrella
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python-umbrella/dist
